<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2f2924">
  <meta name="description" content="Atendimento e agendamento com Dra. Julianna Araujo.">
  <title>Dra. Julianna Araujo | Atendimento</title>

  <style>
    :root{
      --fundo:#f3eee7;
      --cartao:#fffaf5;
      --marrom:#4a3b31;
      --marrom-escuro:#2b231f;
      --marrom-claro:#8b7565;
      --dourado:#c7a56b;
      --linha:#ddd0c3;
      --texto:#352c26;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 18px;
      color:var(--texto);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at top, #fffaf4 0%, var(--fundo) 46%, #e9dfd5 100%);
    }

    .card{
      width:100%;
      max-width:430px;
      padding:0 26px 30px;
      text-align:center;
      background:rgba(255,250,245,.96);
      border:1px solid rgba(139,117,101,.22);
      border-radius:30px;
      box-shadow:0 22px 58px rgba(74,59,49,.16);
      overflow:visible;
    }

    .foto-wrap{
      width:200px;
      height:200px;
      margin:-82px auto 20px;
      padding:4px;
      border-radius:50%;
      background:linear-gradient(145deg,#f4dfb3,#b99155);
      box-shadow:0 14px 34px rgba(74,59,49,.20);
    }

    .foto{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      object-position:center 22%;
      border-radius:50%;
      border:4px solid var(--cartao);
    }

    .logo{
      display:block;
      width:min(220px,68%);
      margin:8px auto 8px;
      mix-blend-mode:multiply;
    }

    h1{
      margin:10px 0 0;
      color:var(--marrom-escuro);
      font-family:Georgia,"Times New Roman",serif;
      font-size:29px;
      font-weight:500;
    }

    .frase{
      margin:14px auto 25px;
      max-width:330px;
      color:#6c5c51;
      font-size:16px;
      line-height:1.55;
    }

    .divisor{
      width:48px;
      height:1px;
      margin:0 auto 24px;
      background:var(--dourado);
    }

    .botao{
      width:100%;
      min-height:55px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-top:12px;
      padding:14px 18px;
      border-radius:16px;
      text-decoration:none;
      font-size:16px;
      font-weight:650;
      transition:transform .2s ease, background .2s ease;
    }

    .botao:active{transform:scale(.985)}

    .principal{
      color:white;
      background:var(--marrom);
      box-shadow:0 10px 24px rgba(74,59,49,.18);
    }

    .secundario{
      color:var(--marrom);
      border:1px solid var(--linha);
      background:#fffaf5;
    }

    .local{
      margin-top:24px;
      color:#8a796d;
      font-size:14px;
    }

    .rodape{
      margin-top:22px;
      padding-top:19px;
      border-top:1px solid #e7ddd4;
      color:#9a897c;
      font-size:12px;
      letter-spacing:.05em;
      text-transform:uppercase;
    }

    svg{width:20px;height:20px;flex:none}

    @media (max-width:420px){
      body{padding-top:74px}
      .card{padding-left:20px;padding-right:20px}
      .foto-wrap{width:148px;height:148px}
      h1{font-size:27px}
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="foto-wrap">
      <img
        class="foto"
        src="9060A61F-3425-4262-87F8-0E586797D13F.png"
        alt="Dra. Julianna Araujo">
    </div>

    <img class="logo" src="logo-julianna.png" alt="Dra. Julianna Araujo — Estética Avançada">



    <p class="frase">
      Naturalidade, segurança e cuidado em cada detalhe.
    </p>

    <div class="divisor"></div>

    <a class="botao principal" href="#" id="whatsappLink">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M20.5 11.5a8.5 8.5 0 0 1-12.6 7.44L3.5 20.5l1.56-4.26A8.5 8.5 0 1 1 20.5 11.5Z" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8.2 7.8c.2-.45.4-.46.72-.47h.6c.16 0 .34.03.44.27l.9 2.15c.1.23.05.42-.08.6l-.58.76c-.13.17-.14.32-.04.5.46.88 1.14 1.62 1.98 2.14.18.11.33.09.48-.05l.84-.78c.17-.16.37-.2.58-.11l2.05.98c.23.11.3.28.26.5-.1.64-.47 1.22-1.02 1.57-.47.3-1.1.42-1.67.29-1.34-.3-2.6-.97-3.63-1.9a10.83 10.83 0 0 1-2.35-3.07c-.5-1.02-.53-1.94-.07-2.83Z" fill="currentColor"/>
      </svg>
      Agendar pelo WhatsApp
    </a>

    <a class="botao secundario" href="https://maps.app.goo.gl/Xkc4s6L8U9xiyzMaA?g_st=ic" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 21s6-5.1 6-11a6 6 0 1 0-12 0c0 5.9 6 11 6 11Z" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="12" cy="10" r="2.2" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      Como chegar
    </a>

    <a class="botao secundario" href="https://www.instagram.com/dra.juliaraujos/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
      </svg>
      Ver perfil no Instagram
    </a>

    <div class="local">📍 Murici – AL</div>
    <div class="rodape">Atendimento mediante agendamento</div>
  </main>

  <script>
    const numero = "5587981131207";
    const mensagem = "Olá! Vim pelo Instagram e gostaria de saber mais sobre os procedimentos.";
    document.getElementById("whatsappLink").href =
      "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);
  </script>
</body>
</html>
