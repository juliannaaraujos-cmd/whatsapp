<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2f2924" />
  <meta name="description" content="Atendimento e agendamento com Julianna Araujo." />
  <title>Julianna Araujo | Atendimento</title>

  <style>
    :root{
      --fundo:#f4efe8;
      --cartao:#fffaf4;
      --marrom:#4a3b31;
      --marrom-claro:#8b7565;
      --linha:#dbcfc3;
      --botao:#5c493c;
      --botao-hover:#46372e;
      --texto:#352c26;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:
        radial-gradient(circle at top, #fffaf4 0%, var(--fundo) 48%, #e9dfd5 100%);
      color:var(--texto);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }

    .card{
      width:100%;
      max-width:430px;
      padding:40px 28px 30px;
      text-align:center;
      background:rgba(255,250,244,.96);
      border:1px solid rgba(139,117,101,.25);
      border-radius:28px;
      box-shadow:0 18px 50px rgba(74,59,49,.14);
      backdrop-filter:blur(8px);
    }

    .monograma{
      width:88px;
      height:88px;
      margin:0 auto 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--linha);
      border-radius:50%;
      color:var(--marrom);
      font-family:Georgia,"Times New Roman",serif;
      font-size:34px;
      letter-spacing:-4px;
      background:#f8f1e9;
    }

    h1{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:30px;
      font-weight:500;
      color:var(--marrom);
    }

    .area{
      margin:9px 0 6px;
      color:var(--marrom-claro);
      font-size:15px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .frase{
      margin:18px auto 28px;
      max-width:320px;
      font-size:16px;
      line-height:1.55;
      color:#66564b;
    }

    .botao{
      width:100%;
      min-height:54px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-top:12px;
      padding:14px 18px;
      border-radius:16px;
      text-decoration:none;
      font-size:16px;
      font-weight:600;
      transition:.2s ease;
    }

    .whatsapp{
      color:white;
      background:var(--botao);
      box-shadow:0 10px 24px rgba(74,59,49,.18);
    }

    .whatsapp:hover{background:var(--botao-hover); transform:translateY(-1px)}

    .instagram{
      color:var(--marrom);
      border:1px solid var(--linha);
      background:transparent;
    }

    .instagram:hover{background:#f3ebe3}

    .local{
      margin-top:24px;
      color:#8a796d;
      font-size:14px;
    }

    .assinatura{
      margin-top:24px;
      padding-top:20px;
      border-top:1px solid #e6dbd1;
      color:#9a897c;
      font-size:12px;
      letter-spacing:.04em;
    }

    svg{width:20px;height:20px;flex:none}

    @media (max-width:420px){
      .card{padding:34px 22px 26px}
      h1{font-size:27px}
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="monograma" aria-label="Monograma JA">JA</div>

    <h1>Julianna Araujo</h1>
    <div class="area">Estética &amp; Bem-Estar</div>

    <p class="frase">
      Resultados naturais, cuidado individualizado e segurança em cada detalhe.
    </p>

    <a class="botao whatsapp" href="#" id="whatsappLink" aria-label="Falar pelo WhatsApp">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M20.5 11.5a8.5 8.5 0 0 1-12.6 7.44L3.5 20.5l1.56-4.26A8.5 8.5 0 1 1 20.5 11.5Z" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8.2 7.8c.2-.45.4-.46.72-.47h.6c.16 0 .34.03.44.27l.9 2.15c.1.23.05.42-.08.6l-.58.76c-.13.17-.14.32-.04.5.46.88 1.14 1.62 1.98 2.14.18.11.33.09.48-.05l.84-.78c.17-.16.37-.2.58-.11l2.05.98c.23.11.3.28.26.5-.1.64-.47 1.22-1.02 1.57-.47.3-1.1.42-1.67.29-1.34-.3-2.6-.97-3.63-1.9a10.83 10.83 0 0 1-2.35-3.07c-.5-1.02-.53-1.94-.07-2.83Z" fill="currentColor"/>
      </svg>
      Falar pelo WhatsApp
    </a>

    <a class="botao instagram" href="https://www.instagram.com/dra.juliaraujos/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
      </svg>
      Ver perfil no Instagram
    </a>

    <div class="local">📍 Murici – AL</div>

    <div class="assinatura">Atendimento mediante agendamento</div>
  </main>

  <script>
    const numero = "5587981131207";
    const mensagem = "Olá! Vim pelo Instagram e gostaria de saber mais sobre os procedimentos.";
    const link = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);
    document.getElementById("whatsappLink").href = link;
  </script>
</body>
</html>
